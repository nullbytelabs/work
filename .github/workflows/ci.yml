name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      # --omit=optional skips @earendil-works/gondolin: its VM tests are opt-in
      # (PI_WF_TEST_GONDOLIN) and it requires Node >= 23.6, so it isn't needed in CI.
      - run: npm ci --omit=optional
      - run: npm run lint
      - run: npm run typecheck

  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "23", "24", "25"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --omit=optional
      - run: npm test

  gondolin:
    name: gondolin VM smoke
    runs-on: ubuntu-latest
    needs: [test]
    # Provisional: GitHub's x86_64 runners expose /dev/kvm and Gondolin ships
    # x86_64 Alpine guest images, so this should work — but it hasn't been proven
    # green from a real run yet. `continue-on-error` keeps it from blocking merges;
    # drop it once the job is confirmed reliable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24" # Gondolin requires Node >= 23.6
          cache: npm
      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils
      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Cache Gondolin guest image
        uses: actions/cache@v4
        with:
          path: ~/.cache/gondolin/images
          key: gondolin-images-${{ runner.os }}-${{ runner.arch }}
      # Full install (with optional deps) so @earendil-works/gondolin is present.
      - run: npm ci
      - name: Run gondolin smoke tests
        run: PI_WF_TEST_GONDOLIN=1 npm test
