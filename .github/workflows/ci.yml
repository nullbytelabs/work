name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: lint + typecheck + knip + fan-in
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25"
          cache: npm
      # Full install: --omit=optional would strip knip's native parser binding
      # (oxc-parser ships its platform binary as a transitive optional dep), and
      # npm can't omit only our own optional deps (@earendil-works/*). They install
      # fine on ubuntu — installing is not running — so the cost is just download time.
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run knip
      # Report-only: surfaces the afferent-coupling distribution in the CI log
      # next to the gates. It always exits 0 — we read the tail, we don't fail on it.
      - run: npm run fan-in
      # Report-only too: the SLOC distribution (largest files + percentiles) so the
      # size shape is tracked in the log over time alongside fan-in. Also exits 0.
      - run: npm run sloc
      # Report-only too: copy/paste duplication across src/ TypeScript (jscpd). No
      # threshold is set, so it exits 0 — we track the clone % in the log over time.
      - run: npm run jscpd

  # Render the VitePress docs on every PR. The Docs workflow (docs.yml) only builds
  # on push-to-main before deploying, so a markdown break (e.g. a literal `${{ }}` in
  # prose — VitePress parses `{{ }}` as a Vue interpolation) used to slip through PR
  # CI and only fail after merge. This job catches it on the PR. Isolated dep tree
  # (docs-site/ has its own package-lock), so it parallels lint/test.
  docs:
    name: docs build (vitepress)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: npm ci
      - run: npm run docs:build

  # One test job runs the whole suite (npm test = non-VM tier + the QEMU tier) in a
  # single pass. We deliberately do NOT also run `test:unit` as a separate gate: it's
  # a strict subset of `npm test`, so it would re-run every non-VM test a second time.
  # `test:unit` stays as the LOCAL fast inner loop; lint-and-typecheck already gives
  # fast parallel feedback here.
  test:
    name: test (full suite, incl. gondolin)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25"
          cache: npm
      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils
      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Cache Gondolin guest image
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/gondolin/images
          key: gondolin-images-${{ runner.os }}-${{ runner.arch }}
      - run: npm ci
      - name: Run full suite (gondolin VM tests included)
        # WORK_TEST_NETWORK=1 un-gates the network examples (checkout, install-node)
        # — the only e2e that reaches the real internet (github.com, nodejs.org), so
        # they're opt-in for hermetic local runs but SHOULD run in CI: they're the
        # integration proof that outbound egress works end-to-end. (The egress
        # *security* contract — deny-by-default, key injection — is proven
        # hermetically by test/egress-e2e.test.ts and needs no flag.) Image builds
        # (WORK_TEST_IMAGES) stay opt-in: they fetch apk packages and are much
        # slower; enable in a dedicated job if/when image regressions warrant it.
        run: npm test
        env:
          WORK_TEST_NETWORK: "1"
