name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
      # --omit=optional skips @earendil-works/gondolin (not needed to lint/typecheck).
      - run: npm ci --omit=optional
      - run: npm run lint
      - run: npm run typecheck

  test:
    name: test (full suite, incl. gondolin)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils
      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Cache Gondolin guest image
        uses: actions/cache@v5
        with:
          path: ~/.cache/gondolin/images
          key: gondolin-images-${{ runner.os }}-${{ runner.arch }}
      - run: npm ci
      - name: Run full suite (gondolin + real npm pipeline enabled)
        run: PI_WF_TEST_GONDOLIN=1 PI_WF_TEST_NPM=1 npm test
