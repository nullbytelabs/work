name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: lint + typecheck + knip + fan-in
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25"
          cache: npm
      # Full install: --omit=optional would strip knip's native parser binding
      # (oxc-parser ships its platform binary as a transitive optional dep), and
      # npm can't omit only our own optional deps (@earendil-works/*). They install
      # fine on ubuntu — installing is not running — so the cost is just download time.
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run knip
      # Report-only: surfaces the afferent-coupling distribution in the CI log
      # next to the gates. It always exits 0 — we read the tail, we don't fail on it.
      - run: npm run fan-in

  test:
    name: test (full suite, incl. gondolin)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25"
          cache: npm
      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils
      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Cache Gondolin guest image
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/gondolin/images
          key: gondolin-images-${{ runner.os }}-${{ runner.arch }}
      - run: npm ci
      - name: Run full suite (gondolin VM tests included)
        # WORK_TEST_NETWORK=1 un-gates the network examples (checkout, install-node)
        # — the only e2e that reaches the real internet (github.com, nodejs.org), so
        # they're opt-in for hermetic local runs but SHOULD run in CI: they're the
        # integration proof that outbound egress works end-to-end. (The egress
        # *security* contract — deny-by-default, key injection — is proven
        # hermetically by test/egress-e2e.test.ts and needs no flag.) Image builds
        # (WORK_TEST_IMAGES) stay opt-in: they fetch apk packages and are much
        # slower; enable in a dedicated job if/when image regressions warrant it.
        run: npm test
        env:
          WORK_TEST_NETWORK: "1"
