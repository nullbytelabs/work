name: Release

# Cut a release by pushing a version tag from main:
#
#   npm version patch        # bumps package.json + lockfile, commits, tags vX.Y.Z
#   git push --follow-tags   # pushes the commit and the tag
#
# Pushing the `v*` tag triggers this workflow, which publishes the package to
# npm (with build provenance) and creates a matching GitHub Release. The version
# bump stays a human decision in a normal commit on main; CI only does the
# mechanical publish — so main's branch protection is never bypassed, and only
# an admin (who alone may push `v*` tags) can trigger a release.
on:
  push:
    tags:
      - "v*"

# Least privilege, granted only to this workflow (the repo default is read-only):
#   contents: write  — create the GitHub Release
#   id-token: write  — mint the OIDC token npm uses for build provenance
permissions:
  contents: write
  id-token: write

# Never run two publishes for the same tag at once.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: publish to npm + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "25"
          cache: npm
          # Point npm at the public registry and wire NODE_AUTH_TOKEN for publish.
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      # Guard: the tag (vX.Y.Z) must equal package.json's version, or we'd publish
      # a mislabeled release. Fail loudly before touching npm.
      - name: Verify tag matches package.json version
        run: |
          pkg=$(node -p "require('./package.json').version")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME (version $tag) does not match package.json ($pkg). Bump with 'npm version' so they agree."
            exit 1
          fi

      # Build the publishable artifact explicitly so a build break fails the run
      # before we authenticate to npm. We then publish that exact dist/ with
      # --ignore-scripts (no second prepack build).
      - run: npm run build

      - name: Publish to npm (public, with provenance)
        run: npm publish --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
