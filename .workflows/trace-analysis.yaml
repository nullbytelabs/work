# trace-analysis
# description: Given a work run id, fetch its OpenTelemetry trace from Grafana Cloud
#              (Tempo) and have an agent analyze it. The run id is the correlation
#              key: traces carry it as the span attribute `work.run.id`, so we first
#              search Tempo (`{ span.work.run.id = "<id>" }`) to resolve the random
#              OTLP trace id, then fetch the full span tree and distill it.
#
#              Grafana access uses a service-account token from the work.json
#              `secrets:` whitelist: the workflow passes `${{ secrets.GRAFANA_TOKEN }}`
#              to the tempo-trace action as its `grafana_token` input. The secret's
#              value comes from your shell env (`"GRAFANA_TOKEN": "$GRAFANA_SERVICE_ACCOUNT_TOKEN"`
#              in work.json reads it host-side), and `work run` / `work serve` dispatch /
#              webhook trigger all just work:
#
#                work run trace-analysis \
#                  --inputs '{"run_id":"fe63caaf-e5c0-47c2-957a-76602b895cab"}'
#
#              Agent-only + one HTTP fetch → machine: small.
---
name: trace-analysis

inputs:
  run_id:
    type: string
    required: true
    description: the work.run.id to analyze (a UUID, as shown in `work` run output)
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  lookback_hours:
    type: number
    default: 720
    description: how far back to search Tempo for the run's trace (default 30 days)

jobs:
  # The only job that touches the secret. Grafana/Tempo access lives in the
  # tempo-trace action: it resolves the run id → trace and distills the span tree.
  # The service-account token is passed in as the `grafana_token` input
  # (${{ secrets.GRAFANA_TOKEN }}), resolved host-side from the work.json secrets:
  # whitelist — so the secret stays in this job and never reaches the agent job.
  fetch:
    runs-on: work:base
    machine: small
    outputs:
      tree: ${{ steps.fetch.outputs.tree }}
    steps:
      - id: fetch
        name: resolve run id → trace and distill the span tree
        uses: action/tempo-trace
        with:
          run_id: ${{ inputs.run_id }}
          grafana_url: ${{ secrets.GRAFANA_URL }}
          grafana_token: ${{ secrets.GRAFANA_TOKEN }}
          lookback_hours: ${{ inputs.lookback_hours }}

  # Feeds on `fetch`'s distilled tree (via needs.fetch.outputs.tree) — no secret
  # in scope. Runs the agent and prints the report.
  analyze:
    runs-on: work:pi
    machine: small
    needs: [fetch]
    outputs:
      analysis: ${{ steps.analyze.outputs.output }}
    steps:
      - id: analyze
        name: analyze the trace
        uses: work/agent
        with:
          prompt: |
            You are a performance + reliability analyst. Below is a distilled
            OpenTelemetry span tree for a single `work` engine run.

            The span shape is: run {workflow} → job {name} → {stage|provision|
            teardown phases + step {name}} → chat {model}. Per-span durations are in
            `[Nms]`. `⚠ ERROR` marks a failed span. Under each job, before its steps,
            are sub-phase spans: `stage` (checkout copy), `provision` (image
            resolve/build + micro-VM boot — this is gondolin boot time), and
            `teardown` (VM dispose); they carry `work.job.phase`. Token usage lives
            on `chat` spans as `gen_ai.usage.input_tokens` /
            `gen_ai.usage.output_tokens` (+ cache_read / cache_creation when present).
            For an agent step, the `chat` span also carries `work.agent.setup_ms`
            (staging + in-guest Pi install) and `work.agent.run_ms` (the model loop);
            the chat span is the model-loop window, so the gap between its parent
            step and it is the setup cost — call out which dominates.

            Produce a concise markdown report with these sections:
            - **Summary** — workflow, run id, total wall-clock, overall success/failure.
            - **Critical path** — the spans that dominate wall-clock; name the long pole
              and what it was (which job/step, and a `chat` model call vs a `run:` step).
            - **Per-job / per-step timing** — a short table of the notable spans.
            - **Token usage** — totals and per-model breakdown across all `chat` spans
              (input/output, and cache hits if any); note "no token data" if absent.
            - **Failures** — any `⚠ ERROR` spans, the `error.type`, and whether the run
              still rolled up to success (continue-on-error).
            - **Takeaways** — 2–4 specific, actionable observations (e.g. a slow step
              worth caching, an unexpectedly large model call, a missing instrumentation).

            Do not invent data not present in the trace. If something is absent, say so.

            === DISTILLED SPAN TREE ===
            ${{ needs.fetch.outputs.tree }}

      - name: show analysis
        env:
          ANALYSIS: ${{ steps.analyze.outputs.output }}
        run: |
          printf '%s\n' "===== TRACE ANALYSIS BEGIN ====="
          printf '%s\n' "$ANALYSIS"
          printf '%s\n' "===== TRACE ANALYSIS END ====="
