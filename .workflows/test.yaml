# test
# description: reusable test workflow — runs the FULL suite (including the real-VM
#              e2e tier) SELF-HOSTED inside a `work:nested` guest. examples.test.ts
#              boots NESTED gondolin micro-VMs: inside the guest there is no
#              /dev/kvm, so gondolin's selectAccel() falls back to TCG (software
#              emulation) automatically. The `work:nested` image is just `work:base`
#              + qemu-system-aarch64 + qemu-img (all stock apk packages — fully
#              portable, nothing machine-specific baked in). The inner VMs download
#              the alpine-base guest image once over the job's egress and reuse it
#              for the whole run (the cache lives in the outer guest). One `npm ci`,
#              then `npm test` as a `continue-on-error` step so a failure doesn't
#              fail the job — `ci` carries the result into `review`. The step's real
#              outcome still shows in the run. Called by `ci` via
#              `uses: workflow/test`; also runnable: `work run test`.
#
# GitHub Actions CI is unaffected — ci.yml runs `npm test` directly, not `work run`.
# The mediated-egress secret-injection e2e skips its two on-box-dial assertions when
# nested (WORK_NESTED) — a gondolin guest-subnet collision, documented in that test;
# the contract stays covered on bare metal.
---
name: test

on:
  workflow_call:
    outputs:
      test: ${{ jobs.unit.outputs.test }}

jobs:
  unit:
    runs-on: work:nested
    machine: { cpus: 8, memory: "64G" }   # outer VM hosts the nested e2e VMs
    # `steps.test.outcome` is the engine's deterministic per-step verdict
    # (success/failure/skipped); `continue-on-error` keeps the job green on a test
    # failure so the outcome still reaches `review` (which leads with it). Failure
    # detail stays in this step's output in the run — no agent re-narrates the log.
    outputs:
      test: ${{ steps.test.outcome }}
    steps:
      - name: install
        run: npm ci

      - id: test
        name: test (full suite, nested VMs)
        continue-on-error: true
        env:
          WORK_SKIP_VM: ""
          WORK_NESTED: "1"            # we ARE a gondolin guest: see egress-e2e skip
        run: npm test
