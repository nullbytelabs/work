# test
# description: reusable test workflow — one gondolin VM, a single `npm ci`, then the
#              non-QEMU test tier (`npm run test:unit`) as a single
#              `continue-on-error` step: a test failure does NOT fail the job, so `ci`
#              can carry the result into `review` for an agent to interpret. The test
#              step's real outcome still shows in the run (failed reads as failed, the
#              job stays green). The e2e + VM-smoke tiers self-skip under WORK_SKIP_VM;
#              they still run in GitHub Actions, the hard gate. Called by `ci` via
#              `uses: workflow/test`; also runnable: `work run test`.
---
name: test

on:
  workflow_call:
    outputs:
      test: ${{ jobs.unit.outputs.test }}

jobs:
  unit:
    runs-on: work:base
    outputs:
      test: ${{ steps.test.outputs.log }}
    steps:
      - name: install
        run: npm ci

      # continue-on-error keeps the job green on a test failure; the combined
      # output (prefixed with its exit code) is captured as `log` for `review`.
      - id: test
        name: test:unit
        continue-on-error: true
        run: |
          out=$(npm run test:unit 2>&1); rc=$?
          printf '%s\n' "$out"
          { echo "log<<__EOF__"; echo "exit $rc"; printf '%s\n' "$out"; echo "__EOF__"; } >> "$WORK_OUTPUT"
          exit $rc
