# checks
# description: reusable static-checks workflow — one gondolin VM, a single `npm ci`,
#              then lint / typecheck / knip / fan-in / sloc each as its own step. A
#              failing tool fails the job — and the `ci` run — so this is a hard gate,
#              not an advisory pass (the run fails fast at the first red tool). fan-in
#              and sloc are report-only (always exit 0): they print structural numbers
#              for the log, they don't gate. Each tool's deterministic OUTCOME
#              (`steps.<id>.outcome`) is also exposed as a workflow_call output for any
#              caller to consume. GitHub Actions (.github/workflows/ci.yml) runs these
#              tools directly too. Called by `ci` via `uses: workflow/checks`; also
#              runnable: `work run checks`.
---
name: checks

on:
  workflow_call:
    outputs:
      lint: ${{ jobs.static.outputs.lint }}
      typecheck: ${{ jobs.static.outputs.typecheck }}
      knip: ${{ jobs.static.outputs.knip }}
      fanin: ${{ jobs.static.outputs.fanin }}
      sloc: ${{ jobs.static.outputs.sloc }}

jobs:
  static:
    runs-on: work:base
    # Expose each tool's deterministic OUTCOME as a job output (success/failure/skipped).
    # `steps.<id>.outcome` is the engine's built-in per-step verdict — no logs, no
    # `$WORK_OUTPUT` plumbing, no LLM in the loop for "did it pass". A failing tool
    # fails the job (hard gate); steps after the first failure don't run. The failed
    # step's output stays visible in the run.
    outputs:
      lint: ${{ steps.lint.outcome }}
      typecheck: ${{ steps.typecheck.outcome }}
      knip: ${{ steps.knip.outcome }}
      fanin: ${{ steps.fanin.outcome }}
      sloc: ${{ steps.sloc.outcome }}
    steps:
      - name: install
        run: npm ci

      - id: lint
        name: lint
        run: npm run lint

      - id: typecheck
        name: typecheck
        run: npm run typecheck

      - id: knip
        name: knip
        run: npm run knip

      - id: fanin
        name: fan-in
        run: npm run fan-in

      - id: sloc
        name: sloc
        run: npm run sloc
