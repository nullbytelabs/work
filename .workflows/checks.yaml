# checks
# description: reusable static-checks workflow — one gondolin VM, a single `npm ci`,
#              then lint / typecheck / knip / fan-in run in CAPTURE mode: each tool's
#              combined output (and exit code) is recorded as a workflow_call output
#              rather than gating the job. This lets `ci` carry the results into the
#              `review` workflow (which reads needs.checks.outputs.*) so an agent can
#              interpret them — pass or fail. The job never aborts, so a lint/type
#              error does NOT fail the run here; the real repo gate is GitHub Actions
#              (.github/workflows/ci.yml), which runs these tools directly. Called by
#              `ci` via `uses: workflow/checks`; also runnable directly: `work run checks`.
---
name: checks

on:
  workflow_call:
    outputs:
      lint: ${{ jobs.static.outputs.lint }}
      typecheck: ${{ jobs.static.outputs.typecheck }}
      knip: ${{ jobs.static.outputs.knip }}
      fanin: ${{ jobs.static.outputs.fanin }}

jobs:
  static:
    runs-on: work:base
    outputs:
      lint: ${{ steps.run.outputs.lint }}
      typecheck: ${{ steps.run.outputs.typecheck }}
      knip: ${{ steps.run.outputs.knip }}
      fanin: ${{ steps.run.outputs.fanin }}
    steps:
      - name: install
        run: npm ci
      - id: run
        name: run checks (capture output; never gate — review reads these)
        run: |
          set +e
          emit() {
            key=$1; shift
            out=$("$@" 2>&1); rc=$?
            {
              printf '%s\n' "${key}<<__WF_EOF__"
              printf 'exit %s\n' "$rc"
              printf '%s\n' "$out"
              printf '%s\n' "__WF_EOF__"
            } >> "$WORK_OUTPUT"
          }
          emit lint      npm run lint
          emit typecheck npm run typecheck
          emit knip      npm run knip
          emit fanin     npm run fan-in
