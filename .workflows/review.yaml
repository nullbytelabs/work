# review (multi-agent)
# description: reusable agent review — fan-out / fan-in. Five reviewers run in
#              parallel, each in its own small gondolin VM: four review one source
#              subsystem (prompts in .workflows/prompts/review-*.md, loaded via
#              promptFile), and `scan-checks` reads the tool output `ci`'s
#              `checks`/`test` jobs already captured (via inherited needs — no
#              re-running). A `collect` editor agent fans findings in: it VERIFIES
#              each candidate against the checkout, drops anything listed in
#              .review/accepted.md, ranks, caps, and emits machine-readable JSON
#              between REVIEW JSON sentinels (the contract the Pi feedback loop
#              parses — see .pi/skills/work/SKILL.md).
#
#              Diff-aware: if `.review/diff.patch` exists in the checkout (write it
#              with `git diff > .review/diff.patch` before running), reviewers scope
#              to the change and its blast radius; scanners whose subsystem is
#              untouched return []. Without a patch it's a broad subsystem review.
#              An empty findings list is a legitimate, expected outcome — reviewers
#              carry no quota.
#
#              Needs a model in work.json (the agent egress allowlists the model
#              host and injects the key host-side). Called by `ci` via
#              `uses: workflow/review`; also runnable: `work run review`
#              (standalone, scan-checks just notes there was no ci feeding it).
#
#              Sizing: every reviewer is agent-only → `machine: small` (2G); five in
#              parallel ≈ 10G peak.
---
name: review

on:
  workflow_call:
    outputs:
      review: ${{ jobs.collect.outputs.review }}

jobs:
  scan-compiler:
    runs-on: work:base
    machine: small
    outputs:
      findings: ${{ steps.r.outputs.output }}
    steps:
      - id: r
        name: review compiler + spec
        uses: work/agent
        with:
          promptFile: .workflows/prompts/review-compiler.md

  scan-runtime:
    runs-on: work:base
    machine: small
    outputs:
      findings: ${{ steps.r.outputs.output }}
    steps:
      - id: r
        name: review runtime + targets
        uses: work/agent
        with:
          promptFile: .workflows/prompts/review-runtime.md

  scan-web:
    runs-on: work:base
    machine: small
    outputs:
      findings: ${{ steps.r.outputs.output }}
    steps:
      - id: r
        name: review web + persistence
        uses: work/agent
        with:
          promptFile: .workflows/prompts/review-web.md

  scan-agent-security:
    runs-on: work:base
    machine: small
    outputs:
      findings: ${{ steps.r.outputs.output }}
    steps:
      - id: r
        name: review agent + egress + config
        uses: work/agent
        with:
          promptFile: .workflows/prompts/review-agent-security.md

  # The tooling reviewer. It does NOT re-run anything: when `review` is called by
  # `ci` (which does `needs: [checks, test]`), this job inherits those needs and
  # reads the tool output `checks`/`test` already captured as their outputs. Run
  # standalone (`work run review`) there is no ci, so these resolve to empty and
  # the agent reports that. Inline prompt: it interpolates `needs.*`, which a
  # promptFile cannot. Agent-only → small.
  scan-checks:
    runs-on: work:base
    machine: small
    outputs:
      findings: ${{ steps.r.outputs.output }}
    steps:
      - id: r
        name: review the captured tooling output
        uses: work/agent
        with:
          prompt: |
            Below is the captured output of this project's own tooling from the ci
            run that called this review (each block starts with its exit code).
            Report anything that warrants attention: lint or type errors, knip
            dead-code / unused-export findings, failing or flaky tests, or a
            fan-in distribution showing an over-relied-on ("god") symbol. Do not
            invent problems the output doesn't show; clean tools produce no
            finding. If the blocks are empty, there was no ci run feeding this —
            output [] in that case too.

            Output: a JSON array ONLY — no prose, no markdown fences. Each finding:
            {"file": "<tool: lint|typecheck|knip|fan-in|test>", "line": null,
             "severity": "critical|high|medium|low", "confidence": "high|medium|low",
             "issue": "what the tool output shows", "fix": "one-line fix direction",
             "evidence": "the relevant lines from the tool output"}

            === lint ===
            ${{ needs.checks.outputs.lint }}

            === typecheck ===
            ${{ needs.checks.outputs.typecheck }}

            === knip ===
            ${{ needs.checks.outputs.knip }}

            === fan-in ===
            ${{ needs.checks.outputs.fanin }}

            === test:unit ===
            ${{ needs.test.outputs.test }}

  collect:
    runs-on: work:base
    machine: small
    needs: [scan-compiler, scan-runtime, scan-web, scan-agent-security, scan-checks]
    outputs:
      review: ${{ steps.editor.outputs.output }}
    steps:
      - id: editor
        name: verify + prioritize the reviews
        uses: work/agent
        with:
          prompt: |
            You are the review editor with the full checkout in your workspace.
            Five reviewers reported candidate findings (their raw output is below —
            ideally JSON arrays, but normalize whatever they sent). Produce ONE
            verified, prioritized review:

            1. VERIFY before keeping: for each candidate, open the cited file and
               confirm the issue is real at that location. Drop anything that
               doesn't hold up, is stylistic, or is speculative — be skeptical; a
               few verified issues beat a long list. Record what you checked in
               the finding's "evidence".
            2. SUPPRESS known findings: if `.review/accepted.md` exists in your
               workspace, read it — it lists findings the maintainers have already
               judged acceptable. Drop any candidate that matches an entry.
            3. De-duplicate overlapping reports, rank by severity, keep at most 6.

            Output a single JSON object ONLY — no prose before or after, no
            markdown fences. Exact shape:
            {"verdict": "clean" | "findings",
             "summary": "2-3 sentences: overall state, what you verified and dropped",
             "findings": [
               {"subsystem": "compiler|runtime|web|agent-security|tooling",
                "file": "src/...", "line": 123, "severity": "critical|high|medium|low",
                "confidence": "high|medium|low", "issue": "...", "fix": "...",
                "evidence": "what you confirmed in the code"}
             ]}
            "verdict": "clean" with an empty findings array is the correct output
            when nothing survives verification.

            === compiler + spec ===
            ${{ needs.scan-compiler.outputs.findings }}

            === runtime + targets ===
            ${{ needs.scan-runtime.outputs.findings }}

            === web + persistence ===
            ${{ needs.scan-web.outputs.findings }}

            === agent + egress + config ===
            ${{ needs.scan-agent-security.outputs.findings }}

            === tooling (lint / typecheck / knip / fan-in / test:unit) ===
            ${{ needs.scan-checks.outputs.findings }}
      - name: show review
        env:
          REVIEW: ${{ steps.editor.outputs.output }}
        run: |
          printf '%s\n' "===== REVIEW JSON BEGIN ====="
          printf '%s\n' "$REVIEW"
          printf '%s\n' "===== REVIEW JSON END ====="
