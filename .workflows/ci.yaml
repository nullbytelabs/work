# ci
# description: dogfoods the engine on itself — composes three reusable workflows via
#              job-level `uses:`. `checks` runs lint/typecheck/knip/fan-in in one VM;
#              `test` then runs the non-QEMU test tier (needs checks → fail-fast).
#              `review` runs a real work/agent code review last (needs test), so it
#              only spends a model call once the code verifies. The e2e/VM-smoke
#              tiers live in GitHub Actions (.github/workflows/ci.yml), where QEMU is
#              available and nested virtualization isn't needed.
# usage: work run ci   (review needs a model in work.json)
---
name: ci

on: webhook

jobs:
  checks:
    uses: workflow/checks # ./workflows/checks.yaml, or ./workflows/reusable/checks.yaml

  test:
    needs: [checks]
    uses: workflow/test # ./workflows/test.yaml, or ./workflows/reusable/test.yaml

  review:
    needs: [test]
    uses: workflow/review # ./workflows/review.yaml, or ./workflows/reusable/review.yaml