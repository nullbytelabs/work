# ci
# description: dogfoods the engine on itself — composes two reusable workflows via
#              job-level `uses:`. `checks` runs lint/typecheck/knip/fan-in in one VM;
#              `unit-tests` then runs the non-QEMU test tier. Sequential (unit-tests
#              needs checks) for fail-fast and one 8G VM at a time. The e2e/VM-smoke
#              tiers live in GitHub Actions (.github/workflows/ci.yml), where QEMU is
#              available and nested virtualization isn't needed.
# usage: work run ci
---
name: ci

on: webhook

jobs:
  checks:
    uses: workflow/checks

  test:
    needs: [checks]
    uses: workflow/test