# ci
# description: the fast, deterministic gate — `checks` (lint/typecheck/knip/fan-in in
#              one VM) then `test` (the non-QEMU test tier, needs checks). Both produce
#              an authoritative pass/fail with no model in the loop, so a run is quick
#              and reliable. The e2e/VM-smoke tiers live in GitHub Actions
#              (.github/workflows/ci.yml), where QEMU is available.
#
#              Agent code review is a SEPARATE workflow — `work run review` — run on
#              demand, so its cost and model-dependence stay out of the gate.
# usage: work run ci
---
name: ci

on: webhook

jobs:
  checks:
    uses: workflow/checks # ./workflows/checks.yaml

  test:
    needs: [checks]
    uses: workflow/test # ./workflows/test.yaml

  # Render the docs-site in a VM so a markdown break fails the gate, not the deploy.
  # Independent of checks/test (its own dependency tree), so it runs in parallel.
  docs:
    uses: workflow/docs # ./workflows/docs.yaml
