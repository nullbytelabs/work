# ci
# description: dogfoods the engine to run its own static checks — lint, typecheck,
#              and knip — each as its own job in its own gondolin micro-VM. Mirrors
#              the lint-and-typecheck job in .github/workflows/ci.yml, minus `npm test`
#              (which boots QEMU). The jobs are chained via `needs:` so they run
#              sequentially — lint → typecheck → knip — each re-running `npm ci` in its
#              own isolated VM. A little wasteful, but it short-circuits on first failure.
# usage: work run ci
---
name: ci

jobs:
  lint:
    runs-on: gondolin
    steps:
      - name: install
        run: npm ci
      - name: lint
        run: npm run lint

  typecheck:
    runs-on: gondolin
    needs: [lint]
    steps:
      - name: install
        run: npm ci
      - name: typecheck
        run: npm run typecheck

  knip:
    runs-on: gondolin
    needs: [typecheck]
    steps:
      - name: install
        run: npm ci
      - name: knip
        run: npm run knip
