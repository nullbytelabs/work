# The triage cluster's connection, as a normal kubeconfig. KUBECONFIG points
# here (see triage.yaml) so jobs just run `kubectl` — no per-job setup.
#
# It can stay fully static because the datasource (work.json) does the moving
# parts host-side:
#   - server is the datasource *label*, not kind's 127.0.0.1. The engine's
#     `resolve` pin dials the real loopback host-side, like curl --resolve.
#   - no certificate-authority: the sandbox installs its egress CA into the
#     guest trust store, so kubectl verifies the proxy with the system store.
#   - the bearer token is injected, not stored. The engine swaps the real
#     ServiceAccount token into the Authorization header host-side; in-guest the
#     token is only a placeholder ($K8S_TOKEN), so the credential never lands in
#     the guest. The exec shim hands kubectl that placeholder at request time —
#     the same mechanism an EKS kubeconfig uses to shell out to `aws eks
#     get-token`.
apiVersion: v1
kind: Config
current-context: triage
clusters:
  - name: triage
    cluster:
      server: https://work-triage.internal:7443
contexts:
  - name: triage
    context:
      cluster: triage
      user: triage-bot
users:
  - name: triage-bot
    user:
      exec:
        apiVersion: client.authentication.k8s.io/v1
        command: sh
        args:
          - -c
          - >
            printf '{"apiVersion":"client.authentication.k8s.io/v1","kind":"ExecCredential","status":{"token":"%s"}}' "$K8S_TOKEN"
        interactiveMode: Never
