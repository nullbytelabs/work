# k8s-triage — repeatable Kubernetes issue triage.
#
# One `run:` job gathers facts with kubectl; an agent job fans them in and names
# the root cause. The agent never touches the cluster — it only reads what the
# deterministic job collected, so every run triages from the same evidence.
#
# Cluster access is a `datasource` (work.json), not a kubeconfig secret in the
# workflow: KUBECONFIG points at the static kubeconfig.yaml in this folder, and
# the datasource supplies the moving parts host-side — the real token swapped
# into the Authorization header, and a `resolve` pin to dial kind's loopback.
# How that egress path works: docs/egress-data-path.md. The connection itself:
# kubeconfig.yaml.
#
# `runs-on: work:k8s` is a workspace-local image (.workflows/images/k8s) — the
# base toolchain plus kubectl baked in, so jobs don't download it every run.
#
# Run from examples/k8s-triage/ (see README.md):
#
#   NODE_EXTRA_CA_CERTS=kind-ca.crt \
#     work run triage --config ../../work.json --datasources k8s
---
name: triage

env:
  KUBECONFIG: /workspace/kubeconfig.yaml

jobs:
  # Fact-finding: what is running, and is anything unhealthy? kubectl is already
  # pointed at the cluster (KUBECONFIG above), so the steps are just queries.
  collect:
    runs-on: work:k8s
    outputs:
      namespaces: ${{ steps.namespaces.logs }}
      workloads: ${{ steps.workloads.logs }}
      pods: ${{ steps.pods.logs }}
      unhealthy: ${{ steps.unhealthy.logs }}
      evidence: ${{ steps.evidence.logs }}
    steps:
      - id: namespaces
        name: list namespaces
        run: kubectl get namespaces
      - id: workloads
        name: list workloads
        run: kubectl get deployments,statefulsets,daemonsets -A
      - id: pods
        name: list pods
        run: kubectl get pods -A -o wide
      - id: unhealthy
        name: find unhealthy pods
        run: |
          kubectl get pods -A --no-headers | grep -Ev 'Running|Completed' > /workspace/unhealthy.txt || true
          if [ -s /workspace/unhealthy.txt ]; then
            cat /workspace/unhealthy.txt
          else
            echo "all pods healthy"
          fi
      - id: evidence
        name: collect evidence for the first unhealthy pod
        run: |
          if [ ! -s /workspace/unhealthy.txt ]; then echo "nothing to collect"; exit 0; fi
          ns=$(awk 'NR==1 {print $1}' /workspace/unhealthy.txt)
          pod=$(awk 'NR==1 {print $2}' /workspace/unhealthy.txt)
          echo "=== describe pod $ns/$pod ==="
          kubectl describe pod -n "$ns" "$pod"
          echo "=== logs (previous run) ==="
          kubectl logs -n "$ns" "$pod" --previous 2>/dev/null || kubectl logs -n "$ns" "$pod"
          echo "=== events in $ns ==="
          kubectl get events -n "$ns" --sort-by=.lastTimestamp
          echo "=== configmaps in $ns ==="
          kubectl get configmaps -n "$ns" -o yaml

  # Fan-in: the agent reads the collected facts and writes the incident report.
  # It runs no kubectl and gets no cluster connection — analysis only.
  diagnose:
    runs-on: work:base
    machine: small
    needs: [collect]
    outputs:
      report: ${{ steps.sre.outputs.output }}
    steps:
      - id: sre
        name: identify the root cause
        uses: work/agent
        with:
          prompt: |
            You are an SRE triaging a Kubernetes cluster. Below is evidence a
            fact-finding job collected with kubectl. Identify what is broken and
            why. Be specific: name the workload, the failure mode, the root cause
            (quote the evidence lines that prove it), and the smallest fix.
            If nothing is broken, say so. Do not speculate beyond the evidence.

            Output a short incident report in this exact shape:
            WORKLOAD: <namespace>/<name>
            FAILURE: <observed failure mode>
            ROOT CAUSE: <why, with the proving evidence quoted>
            FIX: <smallest concrete change>

            === cluster: namespaces ===
            ${{ needs.collect.outputs.namespaces }}

            === cluster: workloads ===
            ${{ needs.collect.outputs.workloads }}

            === cluster: pods ===
            ${{ needs.collect.outputs.pods }}

            === unhealthy pods ===
            ${{ needs.collect.outputs.unhealthy }}

            === evidence ===
            ${{ needs.collect.outputs.evidence }}
      - name: show report
        env:
          REPORT: ${{ steps.sre.outputs.output }}
        run: |
          printf '%s\n' "===== INCIDENT REPORT ====="
          printf '%s\n' "$REPORT"
