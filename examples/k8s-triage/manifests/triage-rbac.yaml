# Read-only credentials for the triage workflow: a ServiceAccount that can list
# and inspect workloads, read pod logs, events, and config — and nothing else.
# setup.sh mints a short-lived token for it (kubectl create token).
apiVersion: v1
kind: Namespace
metadata:
  name: triage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: triage-bot
  namespace: triage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: triage-view
rules:
  - apiGroups: [""]
    resources: [namespaces, nodes, pods, pods/log, events, configmaps, services]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets, daemonsets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: triage-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: triage-view
subjects:
  - kind: ServiceAccount
    name: triage-bot
    namespace: triage
