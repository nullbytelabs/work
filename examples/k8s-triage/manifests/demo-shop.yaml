# A tiny "shop" with one healthy workload and one deliberately broken one.
#
# The bug: `checkout` reads env DATABASE_URL from ConfigMap `checkout-config`
# key `database_url` (marked optional, so the container still starts) — but the
# ConfigMap defines `db_url`. The container logs a FATAL line and exits, so the
# pod lands in CrashLoopBackOff with the root cause spread across the logs,
# the pod spec, and the ConfigMap. Exactly the kind of three-clue failure a
# triage workflow should reassemble.
apiVersion: v1
kind: Namespace
metadata:
  name: shop
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: busybox:1.36
          command: ["sh", "-c", "echo 'frontend up'; while true; do sleep 3600; done"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: checkout-config
  namespace: shop
data:
  db_url: postgres://checkout:checkout@db.shop.svc:5432/checkout
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
        - name: checkout
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo 'checkout-service v2.3.1 starting'
              if [ -z "$DATABASE_URL" ]; then
                echo 'FATAL: DATABASE_URL is empty — cannot reach the orders database' >&2
                exit 1
              fi
              while true; do sleep 3600; done
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: checkout-config
                  key: database_url
                  optional: true
