# A real coding project's CI pipeline.
#
# This project keeps its pipeline + agents in `.workflows/` (like
# `.github/workflows/`). The workflow operates on the PROJECT ROOT checkout — the
# parent of `.workflows/` — so `package.json`, `main.ts`, `npm install`, and
# `npm start` are all right there in each job's workspace. Agent packages live in
# `.workflows/agents/` and are referenced as `uses: agent/<name>`.
#
#   verify: install deps -> check main.ts is valid -> smoke-run `npm start`.
#   review: an agent reads the checked-out source and summarizes it.
#
# The agent runs against the job's workspace (the same checkout), so it reads
# `main.ts` itself — no need to slurp the source into an output and thread it in.
#
# Tests inject a mock runner (no inference). For a real review against a model:
#   ./pi-workflows ./test/e2e/agent-project/.workflows/main.yaml --config pi-workflows.config.json
---
name: ci

jobs:
  verify:
    steps:
      - name: install dependencies
        run: npm install --no-audit --no-fund

      - name: check main.ts is valid
        run: npx tsc --noEmit main.ts

      - name: smoke test (npm start)
        run: npm start --silent

  review:
    needs: [verify]
    outputs:
      review: ${{ steps.summary.outputs.summary }}
    steps:
      - id: summary
        name: review the source with an agent
        uses: agent/summarize

      - name: show review
        env:
          REVIEW: ${{ steps.summary.outputs.summary }}
        run: |
          echo "review -> $REVIEW"
