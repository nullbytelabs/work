# hello world
# description: sequential jobs where `hello-name` depends on `hello-world` before it executes
# usage: ./pi-workflows ./test/e2e/hello-world-needs/workflow.yaml
---
name: hello-world

env:
  HELLO_WORLD: "hello world"
  NAME: "josh"

jobs:
  hello-world:
    runs-on: gondolin
    steps:
      - name: hello-world
        run: |
          echo $HELLO_WORLD

  hello-name:
    runs-on: gondolin
    needs: [hello-world]
    steps:
      - name: hello-name
        run: |
          echo "${HELLO_WORLD}, ${NAME}"