# hello world
# description: simplest possible workflow. uses the workflow engine to simply set an env var `HELLO_WORLD` and then echos it back out
# usage: ./work ./test/e2e/hello-world-gondolin/workflow.yaml
---
name: hello-world

env:
  HELLO_WORLD: "hello world"
  NAME: "josh"

jobs:
  hello-world:
    runs-on: gondolin # the stock guest (pinned; the default is work:base)
    steps:
      - name: hello-world
        run: |
          echo $HELLO_WORLD

  hello-name:
    runs-on: gondolin # the stock guest (pinned; the default is work:base)
    steps:
      - name: hello-name
        run: |
          echo "${HELLO_WORLD}, ${NAME}"