# fan-out / fan-in
# description: a diamond DAG. `prepare` fans out to three independent jobs
#              (lint, unit, typecheck); they fan back in to `report`, which only
#              runs once all three are done. `needs` encodes the shape.
# note: the `needs` DAG gates ordering; the independent middle tier (lint, unit,
#       typecheck) runs in parallel via the Absurd worker's concurrency, then
#       fans back in to `report`.
# usage: ./pi-workflows ./test/e2e/fan-out-fan-in/workflow.yaml
---
name: fan-out-fan-in

jobs:
  prepare:
    runs-on: gondolin
    steps:
      - name: prepare
        run: |
          echo "prepared build inputs"

  lint:
    runs-on: gondolin
    needs: [prepare]
    steps:
      - name: lint
        run: |
          echo "lint: 0 problems"

  unit:
    runs-on: gondolin
    needs: [prepare]
    steps:
      - name: unit
        run: |
          echo "unit: 12 passed"

  typecheck:
    runs-on: gondolin
    needs: [prepare]
    steps:
      - name: typecheck
        run: |
          echo "typecheck: clean"

  report:
    runs-on: gondolin
    needs: [lint, unit, typecheck]
    steps:
      - name: report
        run: |
          echo "all checks converged — ready to ship"
