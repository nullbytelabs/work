# hello world
# description: simplest possible workflow. uses the workflow engine to simply set an env var `HELLO_WORLD` and then echos it back out
# usage: ./pi-workflows ./test/e2e/hello-world-local/workflow.yaml
---
name: hello-world

env:
  HELLO_WORLD: "hello world"
  NAME: "josh"

jobs:
  hello-world:
    runs-on: local
    steps:
      - name: hello-world
        run: |
          echo $HELLO_WORLD

  hello-name:
    runs-on: local
    steps:
      - name: hello-name
        run: |
          echo "${HELLO_WORLD}, ${NAME}"