# matrix build
# description: strategy.matrix fan-out — the compiler expands the job into one
#              independent leg per matrix combination (cartesian product of the
#              axes), with `exclude` pruning a cell and `include` tagging an
#              extra one. All legs converge into a single `report` job via
#              `needs` (a dependency on a matrix job waits for every leg).
# note: each leg is its own durable Absurd task with a deterministic id
#       (`test::node-22_os-linux`); legs run in parallel via worker concurrency.
# usage: ./pi-workflows ./test/e2e/matrix-build/workflow.yaml
---
name: matrix-build

jobs:
  test:
    runs-on: gondolin
    strategy:
      matrix:
        node: [20, 22, 24]
        os: [linux, mac]
        exclude:
          - { node: 20, os: mac } # don't test the oldest node on mac
        include:
          - { node: 24, os: linux, experimental: true } # tag one leg
    steps:
      - name: show-cell
        run: |
          echo "node=${{ matrix.node }} os=${{ matrix.os }} experimental=${{ matrix.experimental }}"

  report:
    runs-on: gondolin
    needs: test # converges after every matrix leg
    steps:
      - name: report
        run: |
          echo "all matrix legs passed — ready to ship"
