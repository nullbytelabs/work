# with inputs
# description: declares typed inputs (a string and a number), maps them into step
#              env vars via ${{ inputs.* }}, and echoes them. Both have defaults,
#              so it runs without --inputs too.
# usage: ./work ./test/e2e/with-inputs/workflow.yaml --inputs '{"name": "josh", "age": 36}'
---
name: with-inputs

inputs:
  name:
    type: string
    description: who to greet
    default: world
  age:
    type: number
    description: their age
    default: 36

env:
  HELLO_WORLD: "hello world"

jobs:
  greet:
    runs-on: gondolin
    steps:
      - name: greet
        # Map inputs into env vars (the idiomatic pattern), then use them in the shell.
        env:
          NAME: ${{ inputs.name }}
          AGE: ${{ inputs.age }}
        run: |
          echo "${HELLO_WORLD}, ${NAME}! you are ${AGE}."
