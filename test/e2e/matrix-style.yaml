# matrix-style fan-out
# description: pi-workflows has no native `strategy.matrix` yet, so this is the
#              manual pattern — one sibling job per parameter, each carrying its
#              own env, all depending on `setup` and converging into `aggregate`.
#              when matrix support lands, these three build-* jobs collapse into
#              a single job with `strategy.matrix.node: [18, 20, 22]`.
# usage: ./pi-workflows ./test/e2e/matrix-style.yaml
---
name: matrix-style

runs-on: local

env:
  APP: "demo"

jobs:
  setup:
    steps:
      - name: setup
        run: echo "resolved dependencies for ${APP}"

  build-node18:
    needs: [setup]
    env:
      NODE_MAJOR: "18"
    steps:
      - name: build
        run: echo "building ${APP} against node ${NODE_MAJOR}"

  build-node20:
    needs: [setup]
    env:
      NODE_MAJOR: "20"
    steps:
      - name: build
        run: echo "building ${APP} against node ${NODE_MAJOR}"

  build-node22:
    needs: [setup]
    env:
      NODE_MAJOR: "22"
    steps:
      - name: build
        run: echo "building ${APP} against node ${NODE_MAJOR}"

  aggregate:
    needs: [build-node18, build-node20, build-node22]
    steps:
      - name: aggregate
        run: echo "all node targets built for ${APP}"
