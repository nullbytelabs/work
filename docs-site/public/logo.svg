<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- DAG: a source fans out to two parallel jobs that converge on a sink.
       Graphite edges + nodes; the source node is "lit" (a running job). -->
  <line x1="30" y1="60" x2="60" y2="30" stroke="#2c313b" stroke-width="5" stroke-linecap="round"/>
  <line x1="30" y1="60" x2="60" y2="90" stroke="#2c313b" stroke-width="5" stroke-linecap="round"/>
  <line x1="60" y1="30" x2="90" y2="60" stroke="#2c313b" stroke-width="5" stroke-linecap="round"/>
  <line x1="60" y1="90" x2="90" y2="60" stroke="#2c313b" stroke-width="5" stroke-linecap="round"/>
  <circle cx="60" cy="30" r="11" fill="#2c313b"/>
  <circle cx="60" cy="90" r="11" fill="#2c313b"/>
  <circle cx="90" cy="60" r="11" fill="#2c313b"/>
  <circle cx="30" cy="60" r="12" fill="#c0421d"/>
</svg>
